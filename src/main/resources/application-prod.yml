server:
  port: 8881

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      fail-on-self-references: false

  jms:
    pub-sub-domain: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
